<div class="space-y-2">
  @if (variant() === 'auth') {
    <label [attr.for]="inputId()" class="text-sm font-medium text-slate-700">{{ label() }}</label>
  } @else {
    <label [attr.for]="inputId()" class="mb-1.5 block text-sm font-medium text-slate-700">{{ label() }}</label>
  }
  <div class="relative">
    @if (variant() === 'auth') {
      <input
        [id]="inputId()"
        [type]="visible() ? 'text' : 'password'"
        [autocomplete]="autocomplete()"
        [formControl]="control()"
        [placeholder]="placeholder()"
        [attr.maxlength]="maxLength() ?? null"
        [attr.inputmode]="inputMode() ?? null"
        class="block w-full rounded-xl border border-slate-200 bg-slate-50 py-2.5 pl-3.5 pr-11 text-sm text-slate-900 outline-none ring-emerald-500/40 transition placeholder:text-slate-400 focus:border-emerald-500 focus:ring-2"
      />
    } @else {
      <input
        [id]="inputId()"
        [type]="visible() ? 'text' : 'password'"
        [autocomplete]="autocomplete()"
        [formControl]="control()"
        [placeholder]="placeholder()"
        [attr.maxlength]="maxLength() ?? null"
        [attr.inputmode]="inputMode() ?? null"
        class="block w-full rounded-xl border border-slate-200 bg-white py-2.5 pl-3 pr-11 text-sm tracking-wider text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/15"
      />
    }
    <button
      type="button"
      class="absolute right-2 top-1/2 flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-lg text-slate-500 outline-none ring-emerald-500/40 transition hover:bg-slate-200/80 hover:text-slate-800 focus-visible:ring-2"
      [attr.aria-label]="visible() ? 'Ocultar ' + labelAria() : 'Mostrar ' + labelAria()"
      [attr.aria-pressed]="visible()"
      (click)="toggle()"
    >
      @if (visible()) {
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.75"
            d="M3.98 8.223A10.477 10.477 0 0 0 .934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 0 1-4.293 5.774M6.228 6.228 14.828 14.828M9.878 9.878l4.243 4.243M14.828 14.828 18 18M21.768 21.768 18 18M3 3l6.59 6.59m0 0A9.953 9.953 0 0 1 12 5c4.478 0 8.268 2.943 9.543 7a9.953 9.953 0 0 1-1.506 2.826M3 3l18 18"
          />
        </svg>
      } @else {
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.75"
            d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.75"
            d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
          />
        </svg>
      }
    </button>
  </div>
</div>
